<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<title>הרבץ לנתאי</title>

<style>
body{
    margin:0;
    background:#87CEEB;
    font-family:monospace;
    overflow:hidden;
    text-align:center;
}

#menu{
    margin-top:100px;
}

.title{
    font-size:64px;
    color:white;
    text-shadow:
    4px 4px #000,
    8px 8px #444;
    image-rendering: pixelated;
}

.madeby{
    font-size:14px;
    color:white;
    margin-top:10px;
}

button{
    margin-top:30px;
    font-size:28px;
    padding:15px 50px;
    border:none;
    background:#2ecc71;
    color:white;
    cursor:pointer;
    box-shadow:4px 4px #000;
}

#game{
    display:none;
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
}

#player{
    position:absolute;
    bottom:50px;
    width:120px;
    image-rendering:pixelated;
}

.rock{
    position:absolute;
    width:25px;
    height:25px;
    border-radius:50%;
    background:gray;
}

#score{
    position:absolute;
    top:20px;
    right:20px;
    font-size:30px;
    color:white;
    text-shadow:2px 2px black;
}
</style>
</head>
<body>

<div id="menu">
    <div class="title">הרבץ לנתאי</div>
    <div class="madeby">Made By Yhonatan Akiva</div>

    <button onclick="startGame()">שחק</button>
</div>

<div id="game">
    <div id="score">0</div>

    <!-- Replace with your image -->
    <img id="player" src="natai.png">
</div>

<script>
const game = document.getElementById("game");
const player = document.getElementById("player");
const scoreText = document.getElementById("score");

let playerX = 400;
let direction = 1;
let score = 0;

function startGame(){
    document.getElementById("menu").style.display="none";
    game.style.display="block";

    player.style.left = playerX+"px";

    setInterval(movePlayer,25);
}

function movePlayer(){

    playerX += direction * (2 + Math.random()*3);

    if(playerX < 0){
        direction = 1;
    }

    if(playerX > window.innerWidth-120){
        direction = -1;
    }

    if(Math.random() < 0.02){
        direction *= -1;
    }

    player.style.left = playerX+"px";
}

game.addEventListener("click",(e)=>{

    const rock = document.createElement("div");
    rock.className = "rock";

    rock.style.left = (window.innerWidth/2)+"px";
    rock.style.bottom = "0px";

    game.appendChild(rock);

    let x = window.innerWidth/2;
    let y = window.innerHeight;

    const dx = (e.clientX - x)/30;
    const dy = (e.clientY - y)/30;

    const interval = setInterval(()=>{

        x += dx;
        y += dy;

        rock.style.left = x+"px";
        rock.style.top = y+"px";

        const rockRect = rock.getBoundingClientRect();
        const playerRect = player.getBoundingClientRect();

        if(
            rockRect.left < playerRect.right &&
            rockRect.right > playerRect.left &&
            rockRect.top < playerRect.bottom &&
            rockRect.bottom > playerRect.top
        ){
            score++;
            scoreText.innerHTML = score;

            rock.remove();
            clearInterval(interval);
        }

        if(
            x < -50 ||
            x > window.innerWidth+50 ||
            y < -50
        ){
            rock.remove();
            clearInterval(interval);
        }

    },16);

});
</script>

</body>
</html>
