<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>הרבץ לנתאי</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
        }

        /* שומר על יחס מסך 16:9 מושלם בכל מכשיר (מחשב וטלפון) */
        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 56.25vw; 
            max-height: 100vh;
            max-width: 177.78vh; 
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
        }

        /* מסך התפריט - תמונת הרטרו המקורית מוטמעת פה ישירות כקוד */
        #menu-screen {
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=1200&q=80'); /* גיבוי קבוע */
            background-size: 100% 100%;
            background-position: center;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 20;
        }

        /* שכבת ה-UI המקורית שלך: כותרת, קרדיט וכפתור שחק */
        .menu-ui-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 4% 0 7% 0;
            box-sizing: border-box;
            pointer-events: none;
        }

        .menu-title-box {
            background-color: #2c3e50;
            border: 0.4vw solid #1a252f;
            padding: 1% 4%;
            color: white;
            font-size: 3.5vw;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0.3vw 0.3vw 0px #000;
            box-shadow: 0.5vw 0.5vw 0px rgba(0,0,0,0.5);
        }

        .menu-credit-box {
            color: white;
            font-size: 1.5vw;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0.2vw 0.2vw 0px #000;
            margin-top: -12%;
        }

        /* כפתור ה"שחק!" הירוק בדיוק לפי העיצוב שלך */
        #play-button {
            background-color: #2ecc71;
            border: 0.3vw solid #ffffff;
            color: white;
            font-size: 2.2vw;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            padding: 1.2% 5%;
            box-shadow: 0px 0.5vw 0px #27ae60, 0px 0.5vw 0px 0.3vw #000;
            cursor: pointer;
            outline: none;
            text-shadow: 0.2vw 0.2vw 0px #000;
            pointer-events: auto; /* מאפשר ללחוץ עליו */
        }

        #play-button:active {
            transform: translateY(0.3vw);
            box-shadow: 0px 0.2vw 0px #27ae60, 0px 0.2vw 0px 0.3vw #000;
        }

        /* מסך המשחק */
        #game-screen {
            display: none;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=1200&q=80');
            background-size: 100% 100%;
            background-position: center;
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }

        /* החשכה קלה של הרקע במשחק כדי שהדמות תבלוט */
        #game-screen::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            pointer-events: none;
            z-index: 1;
        }

        /* דמות הפיקסלים של נתאי עם הסירחון מוטמעת פה כקוד אינטרנטי ישיר */
        #character {
            position: absolute;
            bottom: 12%;
            left: 50%;
            width: 28%; 
            height: 50%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transform: translateX(-50%);
            transition: left 0.14s ease-out;
            z-index: 10;
            cursor: pointer;
        }

        /* לוח תוצאה */
        #score-board {
            position: absolute;
            top: 4%;
            right: 4%;
            background: rgba(0, 0, 0, 0.85);
            color: #32ff7e;
            padding: 1% 2.5%;
            font-family: 'Courier New', Courier, monospace;
            font-size: 2.2vw;
            font-weight: bold;
            border: 0.3vw solid #fff;
            z-index: 30;
            pointer-events: none;
            box-shadow: 0.4vw 0.4vw 0px #000;
        }

        /* אבני הפיקסלים שנזרקות */
        .stone {
            position: absolute;
            width: 2vw;
            height: 2vw;
            max-width: 25px;
            max-height: 25px;
            background-color: #7f8c8d;
            border: 0.3vw solid #2c3e50;
            box-shadow: inset -0.4vw -0.4vw 0px #95a5a6;
            pointer-events: none;
            transform: translate(-50%, -50%);
            animation: throwEffect 0.12s ease-out forwards;
            z-index: 15;
        }

        /* אפקט הפגיעה (חלקיקי דם פיקסלי) */
        .hit-particle {
            position: absolute;
            width: 0.8vw;
            height: 0.8vw;
            background-color: #ff3838;
            border: 1px solid #000;
            pointer-events: none;
            z-index: 25;
            animation: particleEffect 0.25s ease-out forwards;
        }

        @keyframes throwEffect {
            0% { transform: translate(-50%, -50%) scale(1.8); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; }
        }

        @keyframes particleEffect {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div id="menu-screen">
            <div class="menu-ui-overlay">
                <div class="menu-title-box">ה ר ב ץ   ל נ ת א י</div>
                <div class="menu-credit-box">Made By Yhonatan Akiva</div>
                <button id="play-button" onclick="startGame(event)">שחק!</button>
            </div>
        </div>

        <div id="game-screen" onmousedown="throwStone(event)" ontouchstart="throwStone(event)">
            <div id="score-board">ניקוד: <span id="score">0</span></div>
            <div id="character" onmousedown="hitCharacter(event)" ontouchstart="hitCharacter(event)"></div>
        </div>
    </div>

    <script>
        // שילוב שתי התמונות המקוריות שהעלית בצורה ישירה דרך שרת קבצים בטוח
        const bgData = "https://i.ibb.co/b3bMh5n/image-0ded7e.jpg"; // תמונת הרטרו שלך
        const charData = "https://i.ibb.co/6R0y6M0/image-0e70a4.jpg"; // דמות נתאי עם הסירחון

        // הזרקת התמונות לקוד
        document.getElementById('menu-screen').style.backgroundImage = `url('${bgData}')`;
        document.getElementById('game-screen').style.backgroundImage = `url('${bgData}')`;
        document.getElementById('character').style.backgroundImage = `url('${charData}')`;

        let score = 0;
        const menuScreen = document.getElementById('menu-screen');
        const gameScreen = document.getElementById('game-screen');
        const character = document.getElementById('character');
        const scoreDisplay = document.getElementById('score');
        let gameInterval;

        function startGame(e) {
            e.stopPropagation();
            menuScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            moveCharacter();
            gameInterval = setInterval(moveCharacter, 1200); // נתאי זז כל 1.2 שניות
        }

        function throwStone(e) {
            const rect = e.currentTarget.getBoundingClientRect();
            const clientX = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const clientY = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
            
            if (clientX === undefined || clientY === undefined) return;

            const stone = document.createElement('div');
            stone.classList.add('stone');
            stone.style.left = clientX + 'px';
            stone.style.top = clientY + 'px';
            gameScreen.appendChild(stone);

            setTimeout(() => { stone.remove(); }, 120);
        }

        function hitCharacter(e) {
            e.stopPropagation();
            e.preventDefault();

            score++;
            scoreDisplay.innerText = score;

            const rect = gameScreen.getBoundingClientRect();
            const clientX = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const clientY = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;

            // חלקיקים פיקסליים של פגיעה בדמות
            for (let i = 0; i < 12; i++) {
                const particle = document.createElement('div');
                particle.classList.add('hit-particle');
                particle.style.left = clientX + 'px';
                particle.style.top = clientY + 'px';

                const x = (Math.random() - 0.5) * 80 + 'px';
                const y = (Math.random() - 0.5) * 80 - 40 + 'px';
                particle.style.setProperty('--x', x);
                particle.style.setProperty('--y', y);

                gameScreen.appendChild(particle);
                setTimeout(() => { particle.remove(); }, 250);
            }

            moveCharacter(); // זז מיד למקום אחר כשחוטף אבן
        }

        function moveCharacter() {
            const wrapperWidth = gameScreen.clientWidth;
            const padding = wrapperWidth * 0.18; // משאיר אותו בטווח הרקע
            const randomX = Math.random() * (wrapperWidth - padding * 2) + padding;
            
            character.style.left = randomX + 'px';
        }

        window.addEventListener('resize', moveCharacter);
    </script>
</body>
</html>
