<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>הרבץ לנתאי - המשחק</title>
    <style>
        /* איפוס הגדרות למסך מלא בכל מכשיר */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            -webkit-user-select: none;
        }

        /* קונטיינר מרכזי ששומר על פרופורציות המשחק */
        .game-container {
            width: 100%;
            height: 100%;
            position: relative;
            max-width: 100vw;
            max-height: 100vh;
        }

        /* מסך התפריט הראשי - הרקע של חוף הים */
        #menu-screen {
            width: 100%;
            height: 100%;
            background-image: url('menu_bg.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 20;
        }

        /* כפתור ה"שחק!" הירוק הפיקסלי - מעוצב רספונסיבית מעל התמונה */
        #play-button {
            padding: 15px 50px;
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            background-color: #2ecc71;
            border: 4px solid #fff;
            box-shadow: 0px 6px 0px #27ae60, 0px 6px 0px 4px #000;
            cursor: pointer;
            margin-bottom: 8vh; /* מתאים את עצמו לפי גובה המסך (PC או טלפון) */
            text-shadow: 2px 2px 0px #000;
            image-rendering: pixelated;
        }

        #play-button:active {
            transform: translateY(4px);
            box-shadow: 0px 2px 0px #27ae60, 0px 2px 0px 4px #000;
        }

        /* מסך המשחק הראשי */
        #game-screen {
            display: none;
            width: 100%;
            height: 100%;
            background-image: url('menu_bg.jpg');
            background-size: cover;
            background-position: center;
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }

        /* הדמות הפיקסלית של נתאי */
        #character {
            position: absolute;
            bottom: 20%;
            left: 50%;
            width: 30vh; /* הגודל מתאים את עצמו אוטומטית לפי גובה המסך */
            height: 30vh;
            background-image: url('character.jpg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transform: translateX(-50%);
            transition: left 0.2s ease-out;
            z-index: 10;
        }

        /* לוח ניקוד עליון */
        #score-board {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 10px 20px;
            font-size: 24px;
            font-weight: bold;
            border: 3px solid #fff;
            z-index: 30;
            pointer-events: none;
        }

        /* אבן פיקסלים שנזרקת */
        .stone {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #7f8c8d;
            border: 3px solid #2c3e50;
            box-shadow: inset -3px -3px 0px #95a5a6;
            pointer-events: none;
            transform: translate(-50%, -50%);
            animation: throwEffect 0.15s ease-out forwards;
            z-index: 15;
            image-rendering: pixelated;
        }

        /* אפקט חלקיקי פגיעה אדומים */
        .hit-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #ff3838;
            border: 1px solid #000;
            pointer-events: none;
            z-index: 25;
            animation: particleEffect 0.3s ease-out forwards;
        }

        @keyframes throwEffect {
            0% { transform: translate(-50%, -50%) scale(1.8); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; }
        }

        @keyframes particleEffect {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="menu-screen">
            <button id="play-button" onclick="startGame(event)">שחק!</button>
        </div>

        <div id="game-screen" onmousedown="throwStone(event)" ontouchstart="throwStone(event)">
            <div id="score-board">ניקוד: <span id="score">0</span></div>
            <div id="character" onmousedown="hitCharacter(event)" ontouchstart="hitCharacter(event)"></div>
        </div>
    </div>

    <script>
        let score = 0;
        const menuScreen = document.getElementById('menu-screen');
        const gameScreen = document.getElementById('game-screen');
        const character = document.getElementById('character');
        const scoreDisplay = document.getElementById('score');
        let gameInterval;

        function startGame(e) {
            e.stopPropagation();
            menuScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            moveCharacter();
            gameInterval = setInterval(moveCharacter, 1400); // זז כל 1.4 שניות
        }

        function throwStone(e) {
            // תמיכה גם בלחיצת עכבר וגם בנגיעה בטלפון
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            
            if (!clientX || !clientY) return;

            const stone = document.createElement('div');
            stone.classList.add('stone');
            stone.style.left = clientX + 'px';
            stone.style.top = clientY + 'px';
            gameScreen.appendChild(stone);

            setTimeout(() => { stone.remove(); }, 150);
        }

        function hitCharacter(e) {
            e.stopPropagation(); // מונע זריקת אבן כפולה מהרקע
            e.preventDefault();

            score++;
            scoreDisplay.innerText = score;

            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);

            // יצירת חלקיקים שעפים לכל הכיוונים מהפגיעה
            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.classList.add('hit-particle');
                particle.style.left = clientX + 'px';
                particle.style.top = clientY + 'px';

                const x = (Math.random() - 0.5) * 80 + 'px';
                const y = (Math.random() - 0.5) * 80 - 30 + 'px';
                particle.style.setProperty('--x', x);
                particle.style.setProperty('--y', y);

                gameScreen.appendChild(particle);
                setTimeout(() => { particle.remove(); }, 300);
            }

            moveCharacter();
        }

        function moveCharacter() {
            const screenWidth = window.innerWidth;
            // משאיר שוליים כדי שלא יברח מהמסך במובייל
            const padding = screenWidth * 0.15; 
            const randomX = Math.random() * (screenWidth - padding * 2) + padding;
            
            character.style.left = randomX + 'px';
        }

        // התאמה דינמית אם משנים את גודל המסך (למשל הופכים את הטלפון לרוחב)
        window.addEventListener('resize', moveCharacter);
    </script>
</body>
</html>
