<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הרבץ לנתאי - המשחק</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            background-color: #87CEEB; /* צבע גיבוי כחול שמיים כדי שלא יהיה מסך לבן */
        }

        /* מסך התפריט הראשי */
        #menu-screen {
            width: 100%;
            height: 100%;
            background-color: #4682B4; /* צבע גיבוי אם התמונה לא נטענת */
            background-image: url('menu_bg.png'); 
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 50px;
            box-sizing: border-box;
        }

        /* כפתור שקוף/לחיץ על כפתור שחק */
        #play-button {
            width: 300px;
            height: 90px;
            background: rgba(0, 255, 0, 0.2); /* ירוק שקוף עדין כדי שתראה איפה אזור הלחיצה */
            border: 3px dashed #fff;
            cursor: pointer;
            outline: none;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        /* מסך המשחק */
        #game-screen {
            display: none; 
            width: 100%;
            height: 100%;
            position: relative;
            background-color: #4682B4;
            background-image: url('menu_bg.png'); 
            background-size: cover;
            background-position: center;
            cursor: crosshair;
        }

        /* הדמות של נתאי */
        #character {
            position: absolute;
            bottom: 15%;
            left: 50%;
            width: 180px;
            height: 180px;
            background-color: #ffcccc; /* ריבוע גיבוי ורדרד למקרה שהתמונה לא נמצאה */
            background-image: url('character.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transform: translateX(-50%);
            transition: left 0.3s ease-in-out;
            cursor: pointer;
            z-index: 10;
            border-radius: 10px;
        }

        /* לוח תוצאה */
        #score-board {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 10px 20px;
            font-size: 24px;
            font-weight: bold;
            border: 4px solid #fff;
            border-radius: 10px;
            z-index: 20;
        }

        /* אבן פיקסלים שנזרקת */
        .stone {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #555555;
            border: 4px solid #222222;
            pointer-events: none;
            transform: translate(-50%, -50%);
            animation: throwEffect 0.2s ease-out forwards;
            z-index: 15;
        }

        .hit-effect {
            position: absolute;
            width: 15px;
            height: 15px;
            background-color: #ff0000;
            pointer-events: none;
            z-index: 25;
            animation: particle 0.3s ease-out forwards;
        }

        @keyframes throwEffect {
            0% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
        }

        @keyframes particle {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) translateY(-30px) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="menu-screen">
        <button id="play-button" onclick="startGame()"></button>
    </div>

    <div id="game-screen" onclick="throwStone(event)">
        <div id="score-board">ניקוד: <span id="score">0</span></div>
        <div id="character" onclick="hitCharacter(event)"></div>
    </div>

    <script>
        let score = 0;
        const menuScreen = document.getElementById('menu-screen');
        const gameScreen = document.getElementById('game-screen');
        const character = document.getElementById('character');
        const scoreDisplay = document.getElementById('score');

        function startGame() {
            menuScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            moveCharacterLoop();
        }

        function throwStone(e) {
            const stone = document.createElement('div');
            stone.classList.add('stone');
            stone.style.left = e.clientX + 'px';
            stone.style.top = e.clientY + 'px';
            gameScreen.appendChild(stone);

            setTimeout(() => { stone.remove(); }, 200);
        }

        function hitCharacter(e) {
            e.stopPropagation(); 
            score++;
            scoreDisplay.innerText = score;

            for(let i=0; i<5; i++) {
                const hit = document.createElement('div');
                hit.classList.add('hit-effect');
                hit.style.left = (e.clientX + (Math.random() * 40 - 20)) + 'px';
                hit.style.top = (e.clientY + (Math.random() * 40 - 20)) + 'px';
                gameScreen.appendChild(hit);
                setTimeout(() => { hit.remove(); }, 300);
            }
            moveCharacter();
        }

        function moveCharacter() {
            const padding = 100; 
            const screenWidth = window.innerWidth;
            const randomX = Math.random() * (screenWidth - padding * 2) + padding;
            character.style.left = randomX + 'px';
        }

        function moveCharacterLoop() {
            setInterval(() => {
                moveCharacter();
            }, 1500);
        }
    </script>
</body>
</html>
