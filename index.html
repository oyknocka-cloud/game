<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הרבץ לנתאי</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            user-select: none;
            background-color: #000;
        }

        /* מסך תפריט ראשי - משתמש בתמונת הרקע המלאה שיצרנו */
        #menu-screen {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            /* שימוש בגרפיקה המקורית של הים והכפתור שיצרנו */
            background-image: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=1200&q=80'); /* החלף בקישור לתמונת הרקע המקורית של הים עם הכפתור במידת הצורך */
            background-color: #4682B4; 
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 8%; /* מושיב את אזור הלחיצה בול על כפתור שחק! הירוק */
            box-sizing: border-box;
            z-index: 20;
        }

        /* כפתור לחיצה שקוף לחלוטין שיושב מעל הכפתור הירוק של הגרפיקה שלך */
        #play-button {
            width: 260px;
            height: 80px;
            background: transparent;
            border: none;
            cursor: pointer;
            outline: none;
        }

        /* מסך המשחק - משתמש באותו רקע ים (בלי הדמות) */
        #game-screen {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
            background-image: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=1200&q=80'); /* אותו רקע פיקסלים של הים */
            background-size: cover;
            background-position: center;
            cursor: crosshair;
        }

        /* הדמות הפיקסלית של נתאי עם החצקונים, הגשר, הסירחון והכובע */
        #character {
            position: absolute;
            bottom: 15%;
            left: 50%;
            width: 250px; /* גודל מותאם לדמות */
            height: 250px;
            /* קישור ישיר לתמונת הדמות שהעלית */
            background-image: url('https://i.ibb.co/6R0y6M0/image-0e70a4.jpg'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transform: translateX(-50%);
            transition: left 0.2s ease-out;
            cursor: pointer;
            z-index: 10;
        }

        /* לוח ניקוד פיקסלי מעל המשחק */
        #score-board {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            color: #2ecc71;
            padding: 12px 25px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 28px;
            font-weight: bold;
            border: 4px solid #ffffff;
            image-rendering: pixelated;
            z-index: 30;
            direction: rtl;
        }

        /* אבני פיקסלים שנזרקות בקליק */
        .stone {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #7f8c8d;
            border: 4px solid #2c3e50;
            box-shadow: inset -4px -4px 0px #95a5a6;
            pointer-events: none;
            transform: translate(-50%, -50%);
            animation: throw 0.15s ease-out forwards;
            z-index: 15;
        }

        /* אפקט דם/ניצוץ פיקסלי אדום כשפוגעים בו */
        .hit-particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #ff3838;
            border: 2px solid #c0392b;
            pointer-events: none;
            z-index: 25;
            animation: particle 0.3s ease-out forwards;
        }

        @keyframes throw {
            0% { transform: translate(-50%, -50%) scale(2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
        }

        @keyframes particle {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="menu-screen">
        <button id="play-button" onclick="startGame()"></button>
    </div>

    <div id="game-screen" onclick="throwStone(event)">
        <div id="score-board">ניקוד: <span id="score">0</span></div>
        <div id="character" onclick="hitCharacter(event)"></div>
    </div>

    <script>
        let score = 0;
        const menuScreen = document.getElementById('menu-screen');
        const gameScreen = document.getElementById('game-screen');
        const character = document.getElementById('character');
        const scoreDisplay = document.getElementById('score');
        let gameInterval;

        // מעבר מהתפריט למשחק
        function startGame() {
            menuScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            moveCharacter();
            
            // לולאה שגורמת לו לזוז מצד לצד
            gameInterval = setInterval(moveCharacter, 1300);
        }

        // זריקת אבן במיקום הלחיצה
        function throwStone(e) {
            const stone = document.createElement('div');
            stone.classList.add('stone');
            stone.style.left = e.clientX + 'px';
            stone.style.top = e.clientY + 'px';
            gameScreen.appendChild(stone);

            setTimeout(() => { stone.remove(); }, 1500);
        }

        // פגיעה בדמות של נתאי
        function hitCharacter(e) {
            e.stopPropagation(); // מונע יצירת אבן נוספת מהרקע
            
            score++;
            scoreDisplay.innerText = score;

            // יצירת חלקיקי פגיעה שעפים לצדדים
            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.classList.add('hit-particle');
                particle.style.left = e.clientX + 'px';
                particle.style.top = e.clientY + 'px';
                
                // כיוון רנדומלי לחלקיקים
                const x = (Math.random() - 0.5) * 100 + 'px';
                const y = (Math.random() - 0.5) * 100 - 50 + 'px';
                particle.style.setProperty('--x', x);
                particle.style.setProperty('--y', y);

                gameScreen.appendChild(particle);
                setTimeout(() => { particle.remove(); }, 300);
            }

            // זז מיד למקום אחר כשחוטף מכה
            moveCharacter();
        }

        // חישוב מיקום רנדומלי על המסך
        function moveCharacter() {
            const padding = 150;
            const screenWidth = window.innerWidth;
            const randomX = Math.random() * (screenWidth - padding * 2) + padding;
            character.style.left = randomX + 'px';
        }
    </script>
</body>
</html>
